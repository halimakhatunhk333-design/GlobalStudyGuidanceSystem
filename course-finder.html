            padding: 30px;

            height: 100vh;
        }

        .sidebar h2 {
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 40px;
        }

        .nav-link {
            color: var(--text-gray);
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .nav-link.active {
            color: var(--accent);
            font-weight: bold;
        }

        /* Main Content */
        .main {
            margin-left: 250px;
            padding: 50px;
            width: 100%;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .top-info h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        /* NEW: Green Styled Subtitle */
        .top-info p {
            color: var(--accent);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .view-saved-btn {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .view-saved-btn.filtering {
            background: var(--accent);
            color: black;
        }

        /* Course Rows */
        .course-row {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .course-name-btn {
            padding: 25px 30px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .uni-list {
            display: none;
            background: #0a0a0a;
            padding: 10px 30px 20px 30px;
            border-top: 1px solid var(--border);
        }

        .uni-item-name {
            padding: 18px 0;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            color: var(--text-gray);
            display: flex;
            justify-content: space-between;
            transition: color 0.3s ease;
        }

        .uni-item-name.active-uni {
            color: var(--accent);
            font-weight: 600;
        }

        .overview-box {
            display: none;
            background: #151515;
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .box-title {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .description-text {
            font-size: 15px;
            line-height: 1.6;
            color: #d0d0d0;
            margin-bottom: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border-left: 3px solid var(--accent);
        }

        .info-card.no-work {
            border-left-color: var(--danger);
        }

        .info-card.no-work label {
            color: var(--danger);
        }

        .info-card label {
            display: block;
            font-size: 11px;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-card span {
            font-size: 16px;
            color: var(--white);
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-green {
            background: var(--accent);
            color: black;
        }

        .btn-outline {
            border: 1px solid var(--white);
            color: var(--white);
            background: transparent;
        }

        .btn-save {
            background: #222;
            color: var(--white);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Search filter */
        .hidden {
            display: none !important;
        }

        .other-programs {
            margin-top: 25px;
            margin-bottom: 25px;
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 8px;

            display: inline-block;
   
            max-width: fit-content;
      
        }

        .other-programs-title {
            cursor: pointer;
            font-weight: 700;
            color: var(--accent);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

            display: none;
            color: #d0d0d0;
            font-size: 14px;
            line-height: 1.6;
        }


.course-name-btn i {

    display: inline-block;
}

.active-row .course-name-btn i {

}

        let savedIds = JSON.parse(localStorage.getItem('gsgsSavedIds')) || [];
        let onlyShowSaved = false;

function render() {
    
    const area = document.getElementById('displayArea');
    let html = '';

    db.forEach((item, iIdx) => {
        const visibleUnis = onlyShowSaved
            ? item.unis.filter(u => savedIds.includes(u.id))
            : item.unis;

        if (visibleUnis.length > 0) {
            html += `
            <div class="course-row" id="row-${iIdx}">
                <div class="course-name-btn" onclick="toggle('list-${iIdx}', 'row-${iIdx}')">
                    ${item.course}
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="list-${iIdx}" class="uni-list" style="display: ${onlyShowSaved ? 'block' : 'none'}">
                    ${visibleUnis.map(u => {
                        const isSaved = savedIds.includes(u.id);
                        
                        // SEPARATE LOGIC FOR EACH CARD
                        // Card 1: Part-time Work logic
                        const isWorkRestricted = (u.allowWork === false);

                        // Card 2: Stay-back Permit logic (Check for No/None/0)
                        const isStayBackRestricted = /no|none|0/i.test(u.postStudy);

                        return `
                        <div id="label-${u.id}" class="uni-item-name" onclick="toggleUniBox('${u.id}')">
                            <span>${u.name}</span>
                            ${isSaved ? '<i class="fas fa-bookmark" style="color:var(--accent)"></i>' : ''}
                        </div>

                        <div id="box-${u.id}" class="overview-box">
                            <div class="box-title">University Information Overview</div>

                            <p class="description-text">${u.details}</p>

                            <div class="info-grid">
                                <div class="info-card">
                                    <label>Yearly Fee (USD)</label>
                                    <span>${u.cost}</span>
                                </div>
                                <div class="info-card">
                                    <label>IELTS Score</label>
                                    <span>${u.test}</span>
                                </div>
                                <div class="info-card">
                                    <label>When it Starts</label>
                                    <span>${u.start}</span>
                                </div>
                                <div class="info-card">
                                    <label>Last Date to Apply</label>
                                    <span>${u.applyBy}</span>
                                </div>
                                <div class="info-card">
                                    <label>Campus Location</label>
                                    <span>${u.location}</span>
                                </div>
                                <div class="info-card">
                                    <label>Scholarships</label>
                                    <span>${u.gift}</span>
                                </div>

                                <div class="info-card ${isWorkRestricted ? 'no-work' : ''}">
                                    <label>Jobs While Studying</label>
                                    <span>${u.allowWork ? u.partTime : 'Not Allowed'}</span>
                                </div>

                                <div class="info-card ${isStayBackRestricted ? 'no-work' : ''}">
                                    <label>Stay-back Permit</label>
                                    <span>${u.postStudy}</span>
                                </div>
                            </div>

                            <div class="other-programs">
                                <div class="other-programs-title">Other Programs Offered</div>
                                <div id="programs-${u.id}" class="other-programs-list">
                                    ${u.programs ? u.programs.map(p => `• ${p}`).join('<br>') : 'No data available'}
                                </div>
                            </div>

                            <div class="actions">
                                <button class="btn btn-save ${isSaved ? 'active' : ''}" onclick="saveToggle('${u.id}')">
                                    <i class="fas fa-bookmark"></i>
                                    ${isSaved ? 'SHORTLISTED' : 'SAVE TO LIST'}
                                </button>
                                <a href="sop-builder.html" class="btn btn-green">WRITE MY SOP</a>
                                <a href="visa-guide.html" class="btn btn-outline">VISA GUIDE</a>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }
    });

    area.innerHTML = html || '<p style="text-align:center; padding:50px; color:var(--text-gray);">No saved courses found.</p>';

    // Re-attach "Other Programs" click listeners
    document.querySelectorAll('.other-programs-title').forEach(title => {
        title.onclick = function(e) {
            e.stopPropagation();
            const list = this.nextElementSibling;
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        };
    });
}
            
function searchFunction() {
    const input = document.getElementById('uniSearch').value.toLowerCase();
    const courseRows = document.querySelectorAll('.course-row');

    courseRows.forEach((row, rowIdx) => {
        const courseName = row.querySelector('.course-name-btn').innerText.toLowerCase();
        let rowHasMatch = false;

        const uniItems = row.querySelectorAll('.uni-item-name');

        uniItems.forEach(label => {
            const uniId = label.id.split('-')[1];
            const uniBox = document.getElementById('box-' + uniId);

            const uniName = label.querySelector('span').innerText.toLowerCase();
            const uniDetails = uniBox ? uniBox.querySelector('.description-text').innerText.toLowerCase() : '';

            // ✅ Match if input is in course name OR uni name OR uni details
            if (courseName.includes(input) || uniName.includes(input) || uniDetails.includes(input)) {
                label.style.display = ''; // show the uni
                if (uniBox) uniBox.style.display = 'block'; // open its box
                rowHasMatch = true;
            } else {
                label.style.display = 'none';
                if (uniBox) uniBox.style.display = 'none';
            }
        });

        // Show the course row only if it matches or any university matches
        row.style.display = rowHasMatch ? '' : 'none';
    });
}






function toggle(listId, rowId) {
    const list = document.getElementById(listId);
    const row = document.getElementById(rowId);
    
    // Toggle the display
    const isHidden = list.style.display === "none" || list.style.display === "";
    list.style.display = isHidden ? "block" : "none";
    
    // Toggle the rotation class on the parent row
    row.classList.toggle('active-row', isHidden);
}

        function toggleUniBox(uniId) {
            const box = document.getElementById('box-' + uniId);
            const label = document.getElementById('label-' + uniId);
            const isOpening = box.style.display !== "block";

            box.style.display = isOpening ? "block" : "none";

            if (isOpening) {
                label.classList.add('active-uni');
            } else {
                label.classList.remove('active-uni');
            }
        }

        function saveToggle(id) {
            if (savedIds.includes(id)) {
                savedIds = savedIds.filter(sid => sid !== id);
            } else {
                savedIds.push(id);
            }
            localStorage.setItem('gsgsSavedIds', JSON.stringify(savedIds));
            render();
        }

        function toggleSavedFilter() {
            onlyShowSaved = !onlyShowSaved;
            document.getElementById('filterSaved').classList.toggle('filtering');
            render();
        }

        render();
    </script>
